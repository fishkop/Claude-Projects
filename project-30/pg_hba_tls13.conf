# pg_hba_tls13.conf
#
# Lines to ADD to your cluster's pg_hba.conf.
#
# PGDATA = /usr/local/var/postgresql@18
#
# Apply (no restart needed — reload is enough):
#   cat pg_hba_tls13.conf >> /usr/local/var/postgresql@18/pg_hba.conf
#   psql -U sire -c "SELECT pg_reload_conf();"
#
# Verify:
#   psql -U sire -c "SELECT type,database,user_name,address,auth_method FROM pg_hba_file_rules WHERE user_name && ARRAY['testuser','sire'];"
#
# ─── How pg_hba.conf matching works ──────────────────────────────────
#
# Rules are evaluated top-to-bottom; the FIRST matching rule wins.
#
#   hostssl   matches SSL/TLS connections only
#   host      matches both plain-TCP and SSL connections
#
# Strategy used here:
#   1. hostssl rule  →  SSL connections are authenticated (scram-sha-256)
#   2. host reject   →  plain-TCP connections are refused
#
# This guarantees that testuser and sire can ONLY connect over TLS.
# The TLS version (1.3) is enforced server-side via postgresql.conf.
#
# ─────────────────────────────────────────────────────────────────────
# TYPE     DATABASE   USER        ADDRESS           METHOD
# ─────────────────────────────────────────────────────────────────────

# testuser: allow SSL from any IPv4/IPv6 address
hostssl    all        testuser    0.0.0.0/0         scram-sha-256
hostssl    all        testuser    ::/0              scram-sha-256

# testuser: reject any plain (non-TLS) TCP attempt
host       all        testuser    0.0.0.0/0         reject
host       all        testuser    ::/0              reject

# sire (superuser): allow SSL from localhost only
# Restrict superuser remote login to loopback for safety.
hostssl    all        sire        127.0.0.1/32      scram-sha-256
hostssl    all        sire        ::1/128           scram-sha-256

# sire: reject plain TCP even from localhost
host       all        sire        127.0.0.1/32      reject
host       all        sire        ::1/128           reject

# ─────────────────────────────────────────────────────────────────────
# NOTE: Keep your existing rules for other users/databases below this
# block.  Local Unix-socket connections (type = "local") are NOT
# affected by these rules and remain as they were.
