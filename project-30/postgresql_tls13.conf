# postgresql_tls13.conf
#
# Lines to ADD/CHANGE in postgresql.conf to enforce TLS 1.3.
#
# PGDATA = /usr/local/var/postgresql@18
#
# Apply:
#   cat postgresql_tls13.conf >> /usr/local/var/postgresql@18/postgresql.conf
#
# Restart (Homebrew):
#   brew services restart postgresql@18
#
# Verify:
#   psql -U sire -c "SHOW ssl_min_protocol_version;"
#
# ─── SSL / TLS settings ──────────────────────────────────────────────

# Enable SSL in the server
ssl = on

# Minimum allowed TLS protocol version — set to 1.3 to forbid older versions.
# Valid values: TLSv1, TLSv1.1, TLSv1.2, TLSv1.3
ssl_min_protocol_version = 'TLSv1.3'

# Maximum protocol version (optional — pin to 1.3 explicitly).
ssl_max_protocol_version = 'TLSv1.3'

# Server certificate and private key.
# Paths are relative to $PGDATA unless absolute.
ssl_cert_file = 'server.crt'
ssl_key_file  = 'server.key'

# (Optional) Certificate authority file — required for verify-ca / verify-full
# ssl_ca_file = 'root.crt'

# ─── Recommended companion settings ──────────────────────────────────

# Automatically terminate sessions that are idle inside an open transaction.
# Prevents runaway idle_in_transaction connections from the storm simulator.
idle_in_transaction_session_timeout = '30s'

# Kill statements that run longer than 5 seconds.
statement_timeout = '5s'

# ─── Generating a self-signed certificate (for testing only) ─────────
#
#   openssl req -new -x509 -days 365 -nodes \
#       -subj "/CN=localhost" \
#       -keyout /usr/local/var/postgresql@18/server.key \
#       -out    /usr/local/var/postgresql@18/server.crt
#
#   chmod 600 /usr/local/var/postgresql@18/server.key
#
# For production use a certificate signed by a real CA and set
# ssl_ca_file + sslmode=verify-full in the client URI.
